<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禄命排盘 - 调试页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: #1a1a1a; 
            color: #fff; 
            padding: 15px;
        }
        h1 { color: #D4AF37; margin-bottom: 15px; font-size: 18px; }
        h2 { color: #4CAF50; margin: 15px 0 10px; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .section { background: #252525; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .log { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 10px; margin: 10px 0; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .log-item { padding: 3px 0; border-bottom: 1px solid #222; }
        .log-time { color: #888; }
        .log-success { color: #4CAF50; }
        .log-error { color: #F44336; }
        .log-warning { color: #FF9800; }
        .log-info { color: #2196F3; }
        button { 
            background: #D4AF37; 
            color: #000; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            margin: 5px;
            font-weight: bold;
        }
        button:hover { background: #FFD700; }
        .status { padding: 10px; border-radius: 6px; margin: 5px 0; }
        .status-ok { background: rgba(76, 175, 80, 0.2); border: 1px solid #4CAF50; }
        .status-error { background: rgba(244, 67, 54, 0.2); border: 1px solid #F44336; }
        .status-warning { background: rgba(255, 152, 0, 0.2); border: 1px solid #FF9800; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        td, th { padding: 5px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #D4AF37; }
        .nav { margin-bottom: 15px; }
        .nav a { color: #D4AF37; margin-right: 15px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../首页排盘/index.html">排盘</a> |
        <a href="../用户管理/index.html">用户管理</a> |
        <a href="/">API首页</a>
    </div>
    
    <h1>🔍 禄命排盘调试页面</h1>
    
    <div class="section">
        <h2>系统状态</h2>
        <div id="system-status">检查中...</div>
    </div>
    
    <div class="section">
        <h2>IndexedDB 状态</h2>
        <button onclick="checkIndexedDB()">🔍 检查 IndexedDB</button>
        <button onclick="viewRecords()">📋 查看所有记录</button>
        <button onclick="clearRecords()">🗑️ 清除所有记录</button>
        <div id="indexeddb-status" class="log"></div>
    </div>
    
    <div class="section">
        <h2>localStorage 状态</h2>
        <button onclick="checkLocalStorage()">🔍 检查 localStorage</button>
        <button onclick="clearLocalStorage()">🗑️ 清除 localStorage</button>
        <div id="localstorage-status" class="log"></div>
    </div>
    
    <div class="section">
        <h2>测试去重功能</h2>
        <button onclick="testDedup()">🧪 测试去重</button>
        <button onclick="testAddMultiple()">🧪 连续添加3条相同记录</button>
        <div id="dedup-status" class="log"></div>
    </div>
    
    <div class="section">
        <h2>测试用户创建</h2>
        <button onclick="testCreateUser()">🧪 测试创建用户</button>
        <div id="user-status" class="log"></div>
    </div>
    
    <div class="section">
        <h2>实时日志</h2>
        <button onclick="clearLog()">清除日志</button>
        <div id="realtime-log" class="log"></div>
    </div>

    <script src="../common/database.js"></script>
    <script>
        // 全局日志函数
        function addLog(message, type = 'info') {
            const logEl = document.getElementById('realtime-log');
            const time = new Date().toLocaleTimeString();
            const logClass = `log-${type}`;
            logEl.innerHTML = `<div class="log-item"><span class="log-time">[${time}]</span> <span class="${logClass}">${message}</span></div>` + logEl.innerHTML;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearLog() {
            document.getElementById('realtime-log').innerHTML = '';
        }
        
        // 页面加载时检查
        window.addEventListener('DOMContentLoaded', () => {
            addLog('页面加载完成', 'success');
            checkSystem();
        });
        
        // 检查系统状态
        function checkSystem() {
            const el = document.getElementById('system-status');
            let html = '';
            
            html += `<div class="status ${window.indexedDB ? 'status-ok' : 'status-error'}">`;
            html += `IndexedDB: ${window.indexedDB ? '✓ 可用' : '✗ 不可用'}`;
            html += `</div>`;
            
            html += `<div class="status ${navigator.geolocation ? 'status-ok' : 'status-warning'}">`;
            html += `Geolocation: ${navigator.geolocation ? '✓ 可用' : '✗ 不可用'}`;
            html += `</div>`;
            
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                html += `<div class="status status-ok">LocalStorage: ✓ 可用</div>`;
            } catch(e) {
                html += `<div class="status status-error">LocalStorage: ✗ 不可用 - ${e.message}</div>`;
            }
            
            html += `<div class="status status-ok">浏览器: ${navigator.userAgent.substring(0, 50)}...</div>`;
            html += `<div class="status status-ok">当前URL: ${window.location.href}</div>`;
            
            el.innerHTML = html;
            addLog('系统状态检查完成', 'info');
        }
        
        // 检查IndexedDB
        async function checkIndexedDB() {
            const el = document.getElementById('indexeddb-status');
            
            try {
                addLog('开始初始化数据库...', 'info');
                const db = new LumingDatabase();
                await db.init();
                el.innerHTML = `<div class="status status-ok">✓ IndexedDB 初始化成功</div>`;
                addLog('IndexedDB初始化成功', 'success');
                window._testDb = db;
            } catch(e) {
                el.innerHTML = `<div class="status status-error">✗ IndexedDB 错误: ${e.message}</div>`;
                addLog('IndexedDB错误: ' + e.message, 'error');
                console.error('IndexedDB错误详情:', e);
            }
        }
        
        // 查看所有记录
        async function viewRecords() {
            const el = document.getElementById('indexeddb-status');
            
            try {
                if (!window._testDb) await checkIndexedDB();
                const records = await window._testDb.getAllRecords();
                
                let html = `<div class="status status-info">记录总数: ${records.length}</div>`;
                
                if (records.length > 0) {
                    html += '<table><tr><th>ID</th><th>姓名</th><th>性别</th><th>日期</th><th>八字</th><th>actualTime</th><th>userId</th></tr>';
                    records.slice(0, 20).forEach(r => {
                        html += `<tr>
                            <td>${r.id}</td>
                            <td>${r.name}</td>
                            <td>${r.gender}</td>
                            <td>${r.solarDate || r.lunarDate || '-'}</td>
                            <td>${r.year} ${r.month} ${r.day} ${r.hour}</td>
                            <td>${r.actualTime || '-'}</td>
                            <td>${r.userId || '游客'}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    if (records.length > 20) {
                        html += `<p>... 只显示前20条</p>`;
                    }
                }
                
                el.innerHTML = html;
                addLog(`获取到 ${records.length} 条记录`, 'info');
            } catch(e) {
                el.innerHTML = `<div class="status status-error">获取记录失败: ${e.message}</div>`;
                addLog('获取记录失败: ' + e.message, 'error');
            }
        }
        
        // 清除所有记录
        async function clearRecords() {
            if (!confirm('确定要清除所有记录吗？')) return;
            
            try {
                if (!window._testDb) await checkIndexedDB();
                const records = await window._testDb.getAllRecords();
                
                for (const r of records) {
                    await window._testDb.deleteRecord(r.id);
                }
                
                addLog(`已清除 ${records.length} 条记录`, 'success');
                viewRecords();
            } catch(e) {
                addLog('清除记录失败: ' + e.message, 'error');
            }
        }
        
        // 检查localStorage
        function checkLocalStorage() {
            const el = document.getElementById('localstorage-status');
            let html = '<table><tr><th>键</th><th>值</th></tr>';
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                html += `<tr><td>${key}</td><td>${value.substring(0, 100)}${value.length > 100 ? '...' : ''}</td></tr>`;
            }
            
            if (localStorage.length === 0) {
                html += '<tr><td colspan="2">无数据</td></tr>';
            }
            
            html += '</table>';
            el.innerHTML = html;
            addLog(`localStorage: ${localStorage.length} 条记录`, 'info');
        }
        
        // 清除localStorage
        function clearLocalStorage() {
            if (!confirm('确定要清除localStorage吗？')) return;
            localStorage.clear();
            checkLocalStorage();
            addLog('localStorage已清除', 'success');
        }
        
        // 测试去重功能
        async function testDedup() {
            const el = document.getElementById('dedup-status');
            addLog('开始测试去重功能...', 'info');
            
            try {
                if (!window._testDb) await checkIndexedDB();
                
                // 第一条记录
                const record1 = {
                    name: '去重测试1',
                    gender: '男',
                    solarDate: '2000-01-01',
                    actualTime: '2000-01-01',
                    year: '庚辰',
                    month: '戊子',
                    day: '甲子',
                    hour: '甲子',
                    dateType: 'solar'
                };
                
                const before = (await window._testDb.getAllRecords()).length;
                addLog(`添加前记录数: ${before}`, 'info');
                
                const id1 = await window._testDb.addRecord(record1);
                addLog(`第一条记录添加成功，ID: ${id1}`, 'success');
                
                const after1 = (await window._testDb.getAllRecords()).length;
                addLog(`添加后记录数: ${after1}`, 'info');
                
                // 第二条相同记录（只有name不同）
                const record2 = {
                    name: '去重测试2',
                    gender: '男',
                    solarDate: '2000-01-01',
                    actualTime: '2000-01-01',
                    year: '庚辰',
                    month: '戊子',
                    day: '甲子',
                    hour: '甲子',
                    dateType: 'solar'
                };
                
                const id2 = await window._testDb.addRecord(record2);
                addLog(`第二条记录添加完成，ID: ${id2}`, 'success');
                
                const after2 = (await window._testDb.getAllRecords()).length;
                addLog(`添加后记录数: ${after2}`, 'info');
                
                if (after2 === after1) {
                    el.innerHTML = `<div class="status status-ok">✓ 去重功能正常！记录数未增加</div>`;
                    addLog('去重功能正常工作！', 'success');
                } else {
                    el.innerHTML = `<div class="status status-error">✗ 去重功能失效！记录数增加了 (${after1} -> ${after2})</div>`;
                    addLog(`去重失效：记录数从 ${after1} 增加到 ${after2}`, 'error');
                }
                
                viewRecords();
            } catch(e) {
                el.innerHTML = `<div class="status status-error">测试失败: ${e.message}</div>`;
                addLog('去重测试失败: ' + e.message, 'error');
                console.error('去重测试错误:', e);
            }
        }
        
        // 连续添加3条相同记录
        async function testAddMultiple() {
            const el = document.getElementById('dedup-status');
            addLog('开始连续添加3条相同记录...', 'info');
            
            try {
                if (!window._testDb) await checkIndexedDB();
                
                for (let i = 1; i <= 3; i++) {
                    const record = {
                        name: `测试${i}`,
                        gender: '男',
                        solarDate: '1990-05-15',
                        actualTime: '1990-05-15',
                        year: '庚午',
                        month: '辛巳',
                        day: '庚辰',
                        hour: '壬午',
                        dateType: 'solar'
                    };
                    
                    addLog(`添加第${i}条记录...`, 'info');
                    await window._testDb.addRecord(record);
                }
                
                const records = await window._testDb.getAllRecords();
                const testRecords = records.filter(r => r.solarDate === '1990-05-15' && r.gender === '男');
                
                addLog(`1990-05-15男性的记录数: ${testRecords.length}`, testRecords.length === 1 ? 'success' : 'warning');
                el.innerHTML = `<div class="status ${testRecords.length === 1 ? 'status-ok' : 'status-error'}">
                    1990-05-15男性的记录数: ${testRecords.length} (期望: 1)
                </div>`;
                
                viewRecords();
            } catch(e) {
                addLog('测试失败: ' + e.message, 'error');
            }
        }
        
        // 测试创建用户
        async function testCreateUser() {
            const el = document.getElementById('user-status');
            addLog('开始测试创建用户...', 'info');
            
            try {
                // 清除旧用户
                localStorage.removeItem('local_user');
                localStorage.removeItem('current_user');
                addLog('已清除旧用户数据', 'info');
                
                const user = {
                    id: 'local_' + Date.now(),
                    username: '测试用户_' + new Date().toLocaleTimeString(),
                    password: '',
                    type: 'local',
                    createdAt: new Date().toISOString()
                };
                
                localStorage.setItem('local_user', JSON.stringify(user));
                localStorage.setItem('current_user', JSON.stringify(user));
                
                const saved = JSON.parse(localStorage.getItem('local_user'));
                
                el.innerHTML = `<div class="status status-ok">✓ 用户创建成功: ${saved.username}</div>`;
                addLog('用户创建成功: ' + saved.username, 'success');
                
                checkLocalStorage();
            } catch(e) {
                el.innerHTML = `<div class="status status-error">✗ 用户创建失败: ${e.message}</div>`;
                addLog('用户创建失败: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
